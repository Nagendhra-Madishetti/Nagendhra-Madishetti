<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System-time replay: what the ledger knew at each moment">
  <defs>
    <linearGradient id="known" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.9"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="fresh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D8FF4F"/><stop offset="1" stop-color="#86EFAC" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#D8FF4F" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#D8FF4F" stop-opacity="0.85"/>
      <stop offset="0.8" stop-color="#D8FF4F" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#D8FF4F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="380" fill="#08090A"/>
  <g stroke="#101315"><line x1="64" y1="0" x2="64" y2="380"/><line x1="1136" y1="0" x2="1136" y2="380"/></g>

  <text x="64" y="48" font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#EDEFF1">SYSTEM-TIME REPLAY</text>
  <text x="1136" y="48" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#D8FF4F">&#9679; LIVE</text>
  <line x1="64" y1="68" x2="1136" y2="68" stroke="#1A1D1F"/>
  <text x="64" y="92" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif" font-size="13" fill="#6B7176">One fact, two axes. The ledger reports only what it had learned by the scrubber&#8217;s position.</text>

  <!-- axis ticks -->
  <g font-family="SF Mono, Consolas, Menlo, monospace" font-size="9.5" fill="#3A4045" text-anchor="middle">
    <g stroke="#141719">
      <line x1="180" y1="120" x2="180" y2="252"/><line x1="339" y1="120" x2="339" y2="252"/>
      <line x1="498" y1="120" x2="498" y2="252"/><line x1="657" y1="120" x2="657" y2="252"/>
      <line x1="816" y1="120" x2="816" y2="252"/><line x1="975" y1="120" x2="975" y2="252"/>
      <line x1="1134" y1="120" x2="1134" y2="252"/>
    </g>
    <text x="180" y="114">2018</text><text x="339" y="114">2019</text><text x="498" y="114">2020</text>
    <text x="657" y="114">2021</text><text x="816" y="114">2022</text><text x="975" y="114">2023</text>
    <text x="1134" y="114">2024</text>
  </g>

  <!-- EVENT TIME -->
  <text x="64" y="146" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9.5" letter-spacing="1.6" fill="#6B7176">EVENT TIME</text>
  <text x="64" y="160" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9" fill="#3A4045">true in world</text>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.155;0.19;0.645;0.68;1" dur="11s" repeatCount="indefinite"/>
    <rect x="339" y="140" width="795" height="26" rx="3" fill="url(#known)"/>
    <text x="353" y="158" font-family="SF Mono, Consolas, Menlo, monospace" font-size="12" font-weight="700" fill="#062A32">BOSTON</text>
    <text x="1120" y="158" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10" fill="#083C46">valid 2019 &#8594; present</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.645;0.68;1" dur="11s" repeatCount="indefinite"/>
    <rect x="339" y="140" width="477" height="26" rx="3" fill="#22D3EE" fill-opacity="0.18"/>
    <line x1="353" y1="153" x2="418" y2="153" stroke="#5C6266" stroke-width="1"/>
    <text x="353" y="158" font-family="SF Mono, Consolas, Menlo, monospace" font-size="12" font-weight="700" fill="#5C6266">BOSTON</text>
    <text x="802" y="158" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10" fill="#4E5459">expired 2022</text>
    <rect x="816" y="140" width="318" height="26" rx="3" fill="url(#fresh)"/>
    <text x="830" y="158" font-family="SF Mono, Consolas, Menlo, monospace" font-size="12" font-weight="700" fill="#0F1A00">DENVER</text>
    <text x="1120" y="158" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10" fill="#25330A">valid 2022 &#8594; present</text>
  </g>
  <text x="657" y="158" text-anchor="middle" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10.5" fill="#2E3438" opacity="0">
    no facts known
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.155;0.19;1" dur="11s" repeatCount="indefinite"/>
  </text>

  <!-- SYSTEM TIME -->
  <text x="64" y="216" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9.5" letter-spacing="1.6" fill="#6B7176">SYSTEM TIME</text>
  <text x="64" y="230" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9" fill="#3A4045">when learned</text>
  <line x1="180" y1="212" x2="1134" y2="212" stroke="#22262A"/>
  <g font-family="SF Mono, Consolas, Menlo, monospace" font-size="9" fill="#4E5459" text-anchor="middle">
    <circle cx="339" cy="212" r="3.5" fill="#22D3EE"/><text x="339" y="236">2019 filing</text>
    <circle cx="816" cy="212" r="3.5" fill="#D8FF4F"/><text x="816" y="236">2022 correction</text>
  </g>

  <!-- scrubber -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;954,0" dur="11s" repeatCount="indefinite"/>
    <rect x="179.25" y="124" width="1.5" height="92" fill="url(#scanline)"/>
    <circle cx="180" cy="212" r="4.5" fill="#08090A" stroke="#D8FF4F" stroke-width="2"/>
  </g>

  <!-- readout -->
  <line x1="64" y1="272" x2="1136" y2="272" stroke="#1A1D1F"/>
  <text x="64" y="294" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9.5" letter-spacing="2" fill="#3A4045">RETURNS</text>

  <g>
    <g opacity="0">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.155;0.19;1" dur="11s" repeatCount="indefinite"/>
      <text x="64" y="330" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="-0.8" fill="#4E5459">Nothing known yet.</text>
      <text x="64" y="356" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10.5" fill="#3A4045">system_time_replay(2018) &#8594; []</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.155;0.19;0.645;0.68;1" dur="11s" repeatCount="indefinite"/>
      <text x="64" y="330" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="-0.8" fill="#EDEFF1">Headquarters is <tspan fill="#22D3EE">Boston</tspan>, with no known end date.</text>
      <text x="64" y="356" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10.5" fill="#4E5459">the 2022 correction is un-known here &#183; no later knowledge leaks backward</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.645;0.68;1" dur="11s" repeatCount="indefinite"/>
      <text x="64" y="330" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="-0.8" fill="#EDEFF1">Headquarters is <tspan fill="#D8FF4F">Denver</tspan>. Boston expired, not erased.</text>
      <text x="64" y="356" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10.5" fill="#4E5459">superseded_by: 2022 press release &#183; full provenance retained</text>
    </g>
  </g>
  <text x="1136" y="356" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="10" fill="#2E3438">pip install ragbrain</text>
</svg>
