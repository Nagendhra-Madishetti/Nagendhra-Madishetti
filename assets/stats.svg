<svg width="1200" height="272" viewBox="0 0 1200 272" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Telemetry: verified project metrics">
  <defs>
    <linearGradient id="py" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="272" fill="#08090A"/>
  <g stroke="#101315"><line x1="64" y1="0" x2="64" y2="272"/><line x1="1136" y1="0" x2="1136" y2="272"/></g>

  <text x="64" y="48" font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#EDEFF1">TELEMETRY</text>
