<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nagendhra Madishetti · AI Infrastructure, RAG Systems, Agent Memory">
  <defs>
    <radialGradient id="glow" cx="50%" cy="120%" r="90%">
      <stop offset="0%" stop-color="#E50914" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#E50914" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#E50914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E50914" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF2A1F" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E50914" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="#141414"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- top-left channel tag -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.15s" fill="freeze"/>
    <rect x="46" y="40" width="34" height="34" rx="6" fill="#E50914"/>
    <text x="63" y="65" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="#141414">N</text>
    <text x="94" y="63" font-family="Arial, sans-serif" font-size="13" letter-spacing="4" fill="#b3b3b3">NOW STREAMING &#183; NEW YORK</text>
  </g>

  <!-- glow copy of the name -->
  <text x="600" y="168" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="4" fill="#E50914" textLength="980" lengthAdjust="spacingAndGlyphs" filter="url(#blur6)" opacity="0">
    NAGENDHRA MADISHETTI
    <animate attributeName="opacity" values="0;0.55" dur="0.9s" begin="0.35s" fill="freeze"/>
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="5s" begin="1.6s" repeatCount="indefinite"/>
  </text>

  <!-- the name -->
  <text x="600" y="168" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="4" fill="#E50914" textLength="980" lengthAdjust="spacingAndGlyphs" opacity="0">
    NAGENDHRA MADISHETTI
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.35s" fill="freeze"/>
  </text>

  <!-- red sweep under the name -->
  <rect x="150" y="188" width="220" height="3" rx="1.5" fill="url(#sweep)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="x" values="150;830" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="600" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" letter-spacing="7" fill="#b3b3b3" opacity="0">
    AI INFRASTRUCTURE &#183; RAG SYSTEMS &#183; AGENT MEMORY
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.05s" fill="freeze"/>
  </text>

  <!-- bottom meta line -->
  <text x="600" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" letter-spacing="3" fill="#6d6d6d" opacity="0">
    CREATOR OF RAGBRAIN &#183; OPEN DESIGN COLLABORATOR &#183; CVE-2026-48121
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.35s" fill="freeze"/>
  </text>
</svg>
