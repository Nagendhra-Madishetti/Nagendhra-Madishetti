<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nagendhra Madishetti - memory for machines. AI infrastructure, RAG systems, agent memory.">
  <defs>
    <linearGradient id="irid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#A78BFA"/>
      <stop offset="0.34" stop-color="#22D3EE"/>
      <stop offset="0.68" stop-color="#86EFAC"/>
      <stop offset="1"    stop-color="#D8FF4F"/>
    </linearGradient>
    <linearGradient id="iridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="0.5"  stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#D8FF4F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#D8FF4F" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D8FF4F" stop-opacity="0.75"/>
      <stop offset="1"   stop-color="#D8FF4F" stop-opacity="0"/>
    </linearGradient>
    <pattern id="lattice" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.3" fill="#22262A"/>
    </pattern>
    <radialGradient id="lift" cx="76%" cy="45%" r="42%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <clipPath id="cut"><rect width="1200" height="420"/></clipPath>
  </defs>

  <g clip-path="url(#cut)">
    <rect width="1200" height="420" fill="#08090A"/>
    <rect width="1200" height="420" fill="url(#lift)"/>

    <!-- structural hairlines -->
    <g stroke="#16191B">
      <line x1="64" y1="76"  x2="1136" y2="76"/>
      <line x1="64" y1="330" x2="1136" y2="330"/>
      <line x1="64"  y1="0" x2="64"  y2="420" stroke="#101315"/>
      <line x1="1136" y1="0" x2="1136" y2="420" stroke="#101315"/>
    </g>

    <!-- masthead -->
    <text x="64" y="52" font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#EDEFF1">NAGENDHRA MADISHETTI</text>
    <text x="1136" y="52" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" letter-spacing="2.6" fill="#4E5459">NEW YORK &#160;/&#160; 2026</text>

    <!-- thesis -->
    <text x="64" y="182" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif"
          font-size="76" font-weight="700" letter-spacing="-3.4" fill="#EDEFF1" opacity="0">
      MEMORY FOR
      <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.1s" fill="freeze"/>
    </text>
    <text x="64" y="256" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif"
          font-size="76" font-weight="700" letter-spacing="-3.4" fill="#4E5459" opacity="0">
      MACHINES
      <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.28s" fill="freeze"/>
    </text>

    <!-- iridescent rule -->
    <rect x="64" y="278" width="0" height="2" fill="url(#iridFade)">
      <animate attributeName="width" values="0;322" dur="0.9s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
    </rect>

    <text x="64" y="308" font-family="Helvetica Neue, Helvetica, Segoe UI, Arial, sans-serif"
          font-size="15.5" fill="#9BA1A6" opacity="0">
      AI infrastructure &#160;&#183;&#160; RAG systems &#160;&#183;&#160; agent memory
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.62s" fill="freeze"/>
    </text>

    <!-- lattice: a knowledge graph under a passing scan -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1.1s" begin="0.4s" fill="freeze"/>
      <rect x="784" y="112" width="352" height="192" fill="url(#lattice)"/>
      <g stroke="#2E3438" stroke-width="1" fill="none">
        <path d="M816 176 L 880 144 L 944 176 L 1008 144 L 1072 176"/>
        <path d="M816 176 L 880 240 L 944 176"/>
        <path d="M880 240 L 1008 240 L 1072 176"/>
      </g>
      <g fill="#08090A" stroke="#5C6266" stroke-width="1.5">
        <circle cx="880" cy="144" r="4"/><circle cx="1008" cy="144" r="4"/>
        <circle cx="816" cy="176" r="4"/><circle cx="944" cy="176" r="4"/><circle cx="1072" cy="176" r="4"/>
        <circle cx="880" cy="240" r="4"/><circle cx="1008" cy="240" r="4"/>
      </g>
      <circle cx="944" cy="176" r="5.5" fill="#D8FF4F">
        <animate attributeName="opacity" values="1;0.35;1" dur="3.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- scan sweep across the lattice -->
    <rect x="784" y="112" width="2" height="192" fill="url(#scan)" opacity="0.9">
      <animate attributeName="x" values="784;1134;784" dur="9s" begin="1.4s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.65 0 0.35 1; 0.65 0 0.35 1" keyTimes="0;0.5;1"/>
    </rect>
    <text x="1136" y="326" text-anchor="end" font-family="SF Mono, Consolas, Menlo, monospace" font-size="9.5" letter-spacing="1.8" fill="#3A4045">TEMPORAL BELIEF GRAPH &#183; REPLAYING</text>

    <!-- telemetry strip -->
    <g font-family="SF Mono, Consolas, Menlo, monospace" font-size="11" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
      <text x="64"  y="362" fill="#4E5459">PKG</text><text x="64"  y="382" fill="#EDEFF1">ragbrain</text>
      <text x="248" y="362" fill="#4E5459">RELEASE</text><text x="248" y="382" fill="#EDEFF1">v0.1.0</text>
      <text x="432" y="362" fill="#4E5459">SECURITY</text><text x="432" y="382" fill="#EDEFF1">CVE-2026-48121</text>
      <text x="684" y="362" fill="#4E5459">OSS</text><text x="684" y="382" fill="#EDEFF1">open-design / maintainer</text>
      <text x="1136" y="382" text-anchor="end" fill="#D8FF4F">&#9679; AVAILABLE</text>
    </g>

    <rect width="1200" height="420" filter="url(#grain)" opacity="0.045" style="mix-blend-mode:overlay"/>
  </g>
</svg>
